type: object
description: Response from a successful action execution.
required:
  - output
  - meta
properties:
  output:
    type: object
    description: >
      Result of the action execution. Structure varies by action and is described
      by the action's `output_schema`. Always an object; never null.
    example:
      id: 88201
      registration_id: 4821
      event_id: 9917
      status: present
      source: llm
  meta:
    type: object
    required:
      - request_id
    properties:
      request_id:
        type: string
        description: Unique identifier for this request. Include in support requests.
        example: req_01HXYZ1234ABCDEF
      action_name:
        type: string
        description: Name of the action that was executed.
        example: set_registration_attendance
      schema_version:
        type: string
        description: Version of the action schema used.
        example: "1.0.0"

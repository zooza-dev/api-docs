type: object
description: A course in the Zooza catalogue.
required:
  - id
  - name
  - status
  - created_at
properties:
  id:
    type: integer
    readOnly: true
    description: Unique identifier.
    example: 101
  name:
    type: string
    description: Display name of the course.
    example: "Beginner Yoga"
  description:
    type: string
    nullable: true
    description: Rich-text description visible to registrants.
    example: "A gentle introduction to yoga for complete beginners."
  status:
    type: string
    description: |
      Lifecycle status of the course.
      - `active` — visible and accepting registrations
      - `inactive` — not publicly visible
      - `archived` — closed, read-only
    enum:
      - active
      - inactive
      - archived
    example: active
  type:
    type: string
    description: |
      Course delivery type.
      - `group` — scheduled group sessions
      - `individual` — one-on-one sessions
      - `online` — remotely delivered
    enum:
      - group
      - individual
      - online
    example: group
  capacity:
    type: integer
    nullable: true
    description: Maximum number of registrations. Null means unlimited.
    example: 20
  price:
    type: number
    format: float
    nullable: true
    description: Registration price in the company's base currency.
    example: 49.99
  created_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp when the record was created.
    example: "2026-01-15T09:00:00Z"
  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp of the last update.
    example: "2026-02-10T14:30:00Z"

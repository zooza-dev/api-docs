# Path items for /courses, /courses/{course_id}, /courses/{course_id}/schedules

courses:
  get:
    operationId: listCourses
    summary: List courses
    description: >
      Returns a paginated list of courses for the company. Supports full-text
      search and filtering by status and date range.
    tags:
      - Courses
    parameters:
      - $ref: "../../shared/parameters/common.yaml#/HeaderRegion"
      - $ref: "../../shared/parameters/common.yaml#/QueryPage"
      - $ref: "../../shared/parameters/common.yaml#/QueryPageSize"
      - $ref: "../../shared/parameters/common.yaml#/QuerySearch"
      - name: status
        in: query
        required: false
        description: Filter by course status.
        schema:
          type: string
          enum: [active, inactive, archived]
      - name: from
        in: query
        required: false
        description: Return only courses with a schedule starting on or after this date (ISO 8601).
        schema:
          type: string
          format: date
          example: "2026-01-01"
      - name: to
        in: query
        required: false
        description: Return only courses with a schedule starting on or before this date (ISO 8601).
        schema:
          type: string
          format: date
          example: "2026-12-31"
    responses:
      "200":
        description: Paginated list of courses.
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/Course.yaml"
                meta:
                  $ref: "../../shared/schemas/PaginationMeta.yaml"
      "400":
        $ref: "../../shared/responses/errors.yaml#/BadRequest"
      "401":
        $ref: "../../shared/responses/errors.yaml#/Unauthorized"
      "403":
        $ref: "../../shared/responses/errors.yaml#/Forbidden"
      "500":
        $ref: "../../shared/responses/errors.yaml#/InternalServerError"

courseById:
  get:
    operationId: getCourse
    summary: Get a course
    description: Returns a single course by its ID.
    tags:
      - Courses
    parameters:
      - $ref: "../../shared/parameters/common.yaml#/HeaderRegion"
      - $ref: "../components/parameters/paths.yaml#/PathCourseId"
    responses:
      "200":
        description: The requested course.
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  $ref: "../components/schemas/Course.yaml"
      "400":
        $ref: "../../shared/responses/errors.yaml#/BadRequest"
      "401":
        $ref: "../../shared/responses/errors.yaml#/Unauthorized"
      "403":
        $ref: "../../shared/responses/errors.yaml#/Forbidden"
      "404":
        $ref: "../../shared/responses/errors.yaml#/NotFound"
      "500":
        $ref: "../../shared/responses/errors.yaml#/InternalServerError"

courseSchedules:
  get:
    operationId: listCourseSchedules
    summary: List schedules for a course
    description: >
      Alias for `GET /schedules?course_id={course_id}`. Returns all schedules
      belonging to the specified course.
    tags:
      - Courses
    parameters:
      - $ref: "../../shared/parameters/common.yaml#/HeaderRegion"
      - $ref: "../components/parameters/paths.yaml#/PathCourseId"
      - $ref: "../../shared/parameters/common.yaml#/QueryPage"
      - $ref: "../../shared/parameters/common.yaml#/QueryPageSize"
    responses:
      "200":
        description: Paginated list of schedules for this course.
        content:
          application/json:
            schema:
              type: object
              required:
                - data
                - meta
              properties:
                data:
                  type: array
                  items:
                    $ref: "../components/schemas/Schedule.yaml"
                meta:
                  $ref: "../../shared/schemas/PaginationMeta.yaml"
      "400":
        $ref: "../../shared/responses/errors.yaml#/BadRequest"
      "401":
        $ref: "../../shared/responses/errors.yaml#/Unauthorized"
      "403":
        $ref: "../../shared/responses/errors.yaml#/Forbidden"
      "404":
        $ref: "../../shared/responses/errors.yaml#/NotFound"
      "500":
        $ref: "../../shared/responses/errors.yaml#/InternalServerError"

type: object
required:
  - code
  - message
properties:
  code:
    type: string
    description: Machine-readable error code in SCREAMING_SNAKE_CASE.
    example: VALIDATION_ERROR
  message:
    type: string
    description: Human-readable description of the error.
    example: Request validation failed.
  details:
    type: array
    description: >
      Per-field validation errors. Present on 400 and 422 responses.
      Omitted or empty array when not applicable.
    items:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Dot-notation path to the invalid field.
          example: email
        message:
          type: string
          description: Description of the validation failure.
          example: Must be a valid email address.

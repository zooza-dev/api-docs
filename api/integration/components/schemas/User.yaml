type: object
description: A user account on the Zooza platform.
required:
  - id
  - email
  - created_at
properties:
  id:
    type: integer
    readOnly: true
    description: Unique identifier.
    example: 305
  email:
    type: string
    format: email
    description: Primary email address. Used for login and notifications.
    example: "jane.doe@example.com"
  first_name:
    type: string
    nullable: true
    description: Given name.
    example: "Jane"
  last_name:
    type: string
    nullable: true
    description: Family name.
    example: "Doe"
  phone:
    type: string
    nullable: true
    description: Phone number in E.164 format.
    example: "+421901234567"
  created_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp when the account was created.
    example: "2025-11-01T08:00:00Z"
  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp of the last update.
    example: "2026-01-15T12:00:00Z"

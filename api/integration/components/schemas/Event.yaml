type: object
description: A single occurrence (session) within a schedule.
required:
  - id
  - schedule_id
  - course_id
  - start_at
  - end_at
properties:
  id:
    type: integer
    readOnly: true
    description: Unique identifier.
    example: 9917
  schedule_id:
    type: integer
    description: ID of the parent schedule.
    example: 2042
  course_id:
    type: integer
    description: ID of the parent course.
    example: 101
  start_at:
    type: string
    format: date-time
    description: ISO 8601 UTC datetime when the event starts.
    example: "2026-03-05T10:00:00Z"
  end_at:
    type: string
    format: date-time
    description: ISO 8601 UTC datetime when the event ends.
    example: "2026-03-05T11:30:00Z"
  cancelled:
    type: boolean
    description: Whether this specific event has been cancelled.
    example: false
  notes:
    type: string
    nullable: true
    description: Public notes or announcements for this event.
    example: "Bring a yoga mat."
  created_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp when the record was created.
    example: "2026-01-20T11:00:00Z"
  updated_at:
    type: string
    format: date-time
    readOnly: true
    description: ISO 8601 UTC timestamp of the last update.
    example: "2026-02-28T07:00:00Z"
